<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detailing Litoměřice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        :root { --accent: #00d4ff; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .nav-link { position: relative; transition: all 0.3s; }
        .nav-link:after { content:''; position:absolute; bottom:-4px; left:0; width:0; height:2px; background:var(--accent); transition:width 0.4s; }
        .nav-link:hover:after { width:100%; }
        .btn-hover { transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1); }
        .btn-hover:hover { transform: translateY(-5px) scale(1.06); box-shadow: 0 25px 30px -10px rgba(0,212,255,0.45); }
    </style>
</head>
<body class="bg-zinc-950 text-white overflow-x-hidden">

<!-- NAVIGACE -->
<nav class="fixed top-0 left-0 right-0 z-50 bg-zinc-950/90 backdrop-blur-xl border-b border-zinc-800">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
        <a href="/" class="flex items-center">
            <img src="nazev-firmy.png" alt="Detailing Litoměřice" class="h-10 md:h-12 lg:h-14 w-auto object-contain transition-transform hover:scale-105">
        </a>
        <div class="hidden md:flex items-center gap-10 text-lg font-medium">
            <a href="#o-nas" class="nav-link">O NÁS</a>
            <a href="#cenik" class="nav-link">CENÍK</a>
            <a href="#kontakt" class="nav-link">KONTAKT</a>
        </div>
        <div class="flex items-center gap-6">
            <button onclick="toggleCart()" class="relative flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-5 py-2.5 rounded-full text-sm md:text-base">
                <i class="fas fa-shopping-cart"></i> Košík
                <span id="cart-count" class="bg-[var(--accent)] text-zinc-950 text-xs font-bold px-2.5 py-1 rounded-full">0</span>
            </button>
        </div>
    </div>
</nav>

<!-- CENÍK (ukázka – doplň si ostatní služby) -->
<section id="cenik" class="py-24 bg-black">
    <div class="max-w-7xl mx-auto px-6">
        <h2 class="text-5xl font-bold text-center mb-10">CENÍK SLUŽEB</h2>
        <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="bg-zinc-900 rounded-2xl p-6 flex flex-col justify-between">
                <div>
                    <h3 class="text-xl font-bold mb-2">Základní mytí exteriéru</h3>
                    <p class="text-zinc-400 mb-4">Ruční mytí + sušení</p>
                </div>
                <div class="mt-auto">
                    <div class="text-2xl font-bold text-[var(--accent)] mb-4">499 Kč</div>
                    <button onclick="addToCart(1, 'Základní mytí exteriéru', 499)" class="w-full bg-[var(--accent)] hover:bg-[#00b0d4] text-zinc-950 font-semibold py-3 rounded-xl">Přidat do košíku</button>
                </div>
            </div>

            <!-- Příklad další služby – zkopíruj a uprav -->
            <div class="bg-zinc-900 rounded-2xl p-6 flex flex-col justify-between">
                <div>
                    <h3 class="text-xl font-bold mb-2">Mytí kol + pneumatik</h3>
                    <p class="text-zinc-400 mb-4">Důkladné očištění</p>
                </div>
                <div class="mt-auto">
                    <div class="text-2xl font-bold text-[var(--accent)] mb-4">200 Kč</div>
                    <button onclick="addToCart(2, 'Mytí kol + pneumatik', 200)" class="w-full bg-[var(--accent)] hover:bg-[#00b0d4] text-zinc-950 font-semibold py-3 rounded-xl">Přidat do košíku</button>
                </div>
            </div>

            <!-- ... přidej další 2 služby stejným způsobem ... -->
        </div>
    </div>
</section>

<!-- KOŠÍK PANEL -->
<div id="cart-panel" class="fixed inset-y-0 right-0 w-full md:w-96 bg-zinc-950 border-l border-zinc-800 z-50 translate-x-full transition-transform duration-300">
    <div class="p-6 flex flex-col h-full">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">Košík</h2>
            <button onclick="toggleCart()" class="text-4xl hover:text-[var(--accent)]">×</button>
        </div>
        <div id="cart-items" class="flex-1 space-y-4 overflow-y-auto mb-6"></div>
        <div class="border-t border-zinc-700 pt-5 mb-6">
            <div class="flex justify-between text-xl font-bold">
                <span>Celkem:</span>
                <span id="cart-total">0 Kč</span>
            </div>
        </div>
        <!-- kontaktní údaje + tlačítko -->
        <div class="space-y-4 mb-6">
            <input id="order-name" type="text" placeholder="Vaše jméno *" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-5 py-4 focus:border-[var(--accent)]">
            <input id="order-phone" type="tel" placeholder="Telefon *" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-5 py-4 focus:border-[var(--accent)]">
            <input id="order-email" type="email" placeholder="Email *" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-5 py-4 focus:border-[var(--accent)]">
            <textarea id="order-note" placeholder="Poznámka..." rows="3" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-5 py-4 focus:border-[var(--accent)]"></textarea>
        </div>
        <button onclick="sendOrderFromCart()" class="w-full bg-[var(--accent)] hover:bg-[#00b0d4] text-zinc-950 font-bold py-4 rounded-xl text-lg">ODESLAT OBJEDNÁVKU</button>
    </div>
</div>

<script>
emailjs.init({ publicKey: "sxLWM-DVU184sOCjL" });

let cart = [];

function addToCart(id, name, price) {
    let item = cart.find(i => i.id === id);
    if (item) {
        item.qty++;
    } else {
        cart.push({ id, name, price, qty: 1 });
    }
    updateCartDisplay();
    console.log("Přidáno do košíku:", cart); // ← pro debug
}

function removeFromCart(id) {
    cart = cart.filter(i => i.id !== id);
    updateCartDisplay();
    console.log("Po odebrání:", cart);
}

function updateCartDisplay() {
    const countEl = document.getElementById('cart-count');
    const itemsEl = document.getElementById('cart-items');
    const totalEl = document.getElementById('cart-total');

    if (!countEl || !itemsEl || !totalEl) {
        console.error("Některý element košíku chybí v DOM!");
        return;
    }

    const count = cart.reduce((sum, item) => sum + item.qty, 0);
    countEl.textContent = count;

    let html = '';
    let total = 0;

    if (cart.length === 0) {
        html = '<p class="text-zinc-400 text-center py-10">Košík je prázdný</p>';
    } else {
        cart.forEach(item => {
            const itemTotal = item.price * item.qty;
            total += itemTotal;
            html += `
                <div class="bg-zinc-900 p-4 rounded-xl flex justify-between items-start gap-4">
                    <div class="flex-1">
                        <div class="font-medium">${item.name}</div>
                        <div class="text-sm text-zinc-400">${item.qty} × ${item.price.toLocaleString('cs-CZ')} Kč</div>
                    </div>
                    <div class="text-right shrink-0">
                        <div class="font-bold">${itemTotal.toLocaleString('cs-CZ')} Kč</div>
                        <button onclick="removeFromCart(${item.id})" class="text-red-500 hover:text-red-300 text-sm mt-1">Odebrat</button>
                    </div>
                </div>`;
        });
    }

    itemsEl.innerHTML = html;
    totalEl.textContent = total.toLocaleString('cs-CZ') + ' Kč';
}

function toggleCart() {
    document.getElementById('cart-panel').classList.toggle('translate-x-full');
}

function sendOrderFromCart() {
    // ... tady nech tvou původní logiku odesílání přes EmailJS ...
    // po úspěšném odeslání zavolej:
    // cart = [];
    // updateCartDisplay();
    // toggleCart();
    alert("Objednávka odeslána (implementuj EmailJS podle potřeby)");
}

document.addEventListener('DOMContentLoaded', () => {
    updateCartDisplay(); // inicializace při načtení stránky
});
</script>

</body>
</html>
