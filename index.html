<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detailing Litoměřice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        :root { --accent: #00d4ff; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .nav-link { position: relative; transition: all 0.3s; }
        .nav-link:after { content:''; position:absolute; bottom:-4px; left:0; width:0; height:2px; background:var(--accent); transition:width 0.4s; }
        .nav-link:hover:after { width:100%; }
        .btn-hover { transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1); }
        .btn-hover:hover { transform: translateY(-5px) scale(1.06); box-shadow: 0 25px 30px -10px rgba(0,212,255,0.45); }
    </style>
</head>
<body class="bg-zinc-950 text-white overflow-x-hidden">

<!-- NAVIGACE -->
<nav class="fixed top-0 left-0 right-0 z-50 bg-zinc-950/90 backdrop-blur-xl border-b border-zinc-800">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
        <a href="/" class="flex items-center">
            <img src="nazev-firmy.png" alt="Detailing Litoměřice" class="h-10 md:h-12 lg:h-14 w-auto object-contain transition-transform hover:scale-105">
        </a>
        <div class="hidden md:flex items-center gap-10 text-lg font-medium">
            <a href="#o-nas" class="nav-link">O NÁS</a>
            <a href="#cenik" class="nav-link">CENÍK</a>
            <a href="#kontakt" class="nav-link">KONTAKT</a>
        </div>
        <div class="flex items-center gap-6">
            <button onclick="toggleCart()" class="relative flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-5 py-2.5 rounded-full text-sm md:text-base">
                <i class="fas fa-shopping-cart"></i> Košík
                <span id="cart-count" class="bg-[#00d4ff] text-zinc-950 text-xs font-bold px-2.5 py-1 rounded-full">0</span>
            </button>
            <a href="#kontakt" class="btn-hover hidden md:flex bg-[#00d4ff] hover:bg-[#00b0d4] text-zinc-950 font-semibold px-8 py-3.5 rounded-full items-center gap-2 text-sm uppercase tracking-widest">
                <i class="fas fa-car"></i> OBJEDNAT
            </a>
        </div>
    </div>
</nav>

<!-- HERO, O NÁS, CENÍK – beze změny, zkracuji pro přehlednost -->
<!-- ... (sem vlož své sekce HERO, O NÁS, CENÍK – jsou v pořádku) ... -->

<!-- KOŠÍK PANEL (popup zprava) -->
<div id="cart-panel" class="hidden fixed top-0 right-0 bottom-0 w-full md:w-96 bg-zinc-950 border-l border-zinc-800 z-50 overflow-y-auto transition-transform duration-300 translate-x-full">
    <div class="p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">Košík</h2>
            <button onclick="toggleCart()" class="text-3xl hover:text-[#00d4ff]">×</button>
        </div>

        <div id="cart-items" class="space-y-4 mb-6 min-h-[150px]"></div>

        <div class="border-t border-zinc-700 pt-4 mb-6">
            <div class="flex justify-between text-xl font-bold">
                <span>Celkem:</span>
                <span id="cart-total">0 Kč</span>
            </div>
        </div>

        <div class="space-y-4 mb-6">
            <input id="order-name"   type="text"     placeholder="Vaše jméno *"   class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3 text-white focus:border-[#00d4ff] outline-none">
            <input id="order-phone"  type="tel"      placeholder="Telefon *"      class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3 text-white focus:border-[#00d4ff] outline-none">
            <input id="order-email"  type="email"    placeholder="Váš email *"    class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3 text-white focus:border-[#00d4ff] outline-none">
            <textarea id="order-note" placeholder="Poznámka, termín, adresa..." rows="3" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3 text-white focus:border-[#00d4ff] outline-none"></textarea>
        </div>

        <button onclick="sendOrderFromCart()" class="w-full bg-[#00d4ff] hover:bg-white hover:text-zinc-950 text-zinc-950 py-4 rounded-xl font-bold text-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
            ODESLAT OBJEDNÁVKU
        </button>
    </div>
</div>

<!-- KONTAKT – beze změny, ale lepší event listener níže -->

<script>
    emailjs.init({ publicKey: "sxLWM-DVU184sOCjL" });

    let cart = [];

    function addToCart(id, name, price) {
        const existing = cart.find(item => item.id === id);
        if (existing) existing.qty++;
        else cart.push({ id, name, price, qty: 1 });
        updateCartDisplay();
    }

    function removeFromCart(id) {
        cart = cart.filter(item => item.id !== id);
        updateCartDisplay();
    }

    function updateCartDisplay() {
        const countEl   = document.getElementById('cart-count');
        const itemsEl   = document.getElementById('cart-items');
        const totalEl   = document.getElementById('cart-total');

        const count = cart.reduce((sum, item) => sum + item.qty, 0);
        countEl.textContent = count;

        let html = '';
        let total = 0;

        if (cart.length === 0) {
            html = '<p class="text-zinc-400 text-center py-12">Košík je prázdný</p>';
        } else {
            cart.forEach(item => {
                const itemTotal = item.price * item.qty;
                total += itemTotal;
                html += `
                    <div class="flex justify-between items-center bg-zinc-900 p-4 rounded-xl">
                        <div>
                            <div class="font-medium">${item.name}</div>
                            <div class="text-sm text-zinc-400">${item.qty} × ${item.price} Kč</div>
                        </div>
                        <div class="text-right">
                            <div class="font-bold">${itemTotal.toLocaleString('cs-CZ')} Kč</div>
                            <button onclick="removeFromCart(${item.id})" class="text-red-500 hover:text-red-400 text-sm mt-1">Odebrat</button>
                        </div>
                    </div>`;
            });
        }

        itemsEl.innerHTML = html;
        totalEl.textContent = total.toLocaleString('cs-CZ') + ' Kč';
    }

    function toggleCart() {
        const panel = document.getElementById('cart-panel');
        panel.classList.toggle('hidden');
        // plynulý slide-in efekt
        if (!panel.classList.contains('hidden')) {
            panel.classList.remove('translate-x-full');
        } else {
            panel.classList.add('translate-x-full');
        }
    }

    function sendOrderFromCart() {
        const name  = document.getElementById('order-name').value.trim();
        const phone = document.getElementById('order-phone').value.trim();
        const email = document.getElementById('order-email').value.trim();
        const note  = document.getElementById('order-note').value.trim();

        // Jednoduchá validace
        if (!name)    return alert('Zadejte prosím jméno.');
        if (!phone)   return alert('Zadejte prosím telefon.');
        if (!email || !email.includes('@') || !email.includes('.')) {
            return alert('Zadejte platný email.');
        }
        if (cart.length === 0) return alert('Košík je prázdný.');

        const cartSummary = cart.map(item =>
            `• ${item.name} × ${item.qty} ks (${(item.price * item.qty).toLocaleString('cs-CZ')} Kč)`
        ).join('\n');

        const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);

        const templateParams = {
            customer_name:     name,
            customer_phone:    phone,
            customer_email:    email,
            cart_summary_text: cartSummary,
            total:             total.toLocaleString('cs-CZ'),
            message:           note || "Bez poznámky",
            date:              new Date().toLocaleString('cs-CZ')
        };

        const btn = event.target;
        btn.disabled = true;
        btn.textContent = 'ODESÍLÁM...';

        emailjs.send('service_grki78a', 'template_za7zkkk', templateParams)   // ← změň template ID pokud máš jinou šablonu
            .then(() => {
                alert('Objednávka úspěšně odeslána! Brzy se ozveme.');
                cart = [];
                updateCartDisplay();
                toggleCart();
                // vyčištění
                document.getElementById('order-name').value = '';
                document.getElementById('order-phone').value = '';
                document.getElementById('order-email').value = '';
                document.getElementById('order-note').value = '';
            })
            .catch(err => {
                console.error(err);
                alert('Chyba při odesílání. Zkuste to prosím později.');
            })
            .finally(() => {
                btn.disabled = false;
                btn.textContent = 'ODESLAT OBJEDNÁVKU';
            });
    }

    // ────────────────────────────────────────────────
    // KONTAKTNÍ FORMULÁŘ (samostatný)
    // ────────────────────────────────────────────────
    document.getElementById('kontakt-form').addEventListener('submit', function(e) {
        e.preventDefault();

        const btn = this.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> ODESÍLÁM...';

        const templateParams = {
            name:    this.querySelector('[name="name"]').value.trim(),
            phone:   this.querySelector('[name="phone"]').value.trim(),
            email:   this.querySelector('[name="email"]').value.trim(),
            message: this.querySelector('[name="message"]').value.trim(),
            date:    new Date().toLocaleString('cs-CZ')
        };

        emailjs.send('service_grki78a', 'template_wzsl67r', templateParams)
            .then(() => {
                document.getElementById('success-message').classList.remove('hidden');
                this.reset();
                setTimeout(() => document.getElementById('success-message').classList.add('hidden'), 8000);
            })
            .catch(err => {
                console.error(err);
                alert('Nepodařilo se odeslat zprávu.');
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = 'ODESLAT';
            });
    });
</script>

</body>
</html>
