<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detailing Litoměřice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <style>
        :root { --accent: #00d4ff; }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .nav-link { position: relative; }
        .nav-link:after { content:''; position:absolute; bottom:-4px; left:0; width:0; height:2px; background:var(--accent); transition:width 0.4s; }
        .nav-link:hover:after { width:100%; }
        .btn-hover { transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1); }
        .btn-hover:hover { transform: translateY(-5px) scale(1.06); }
        .cart-item { transition: all 0.3s; }
    </style>
</head>
<body class="bg-zinc-950 text-white">

<!-- NAV -->
<nav class="fixed top-0 left-0 right-0 z-50 bg-zinc-950/90 backdrop-blur-xl border-b border-zinc-800">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
        <a href="/" class="flex items-center">
            <img src="nazev-firmy.png" alt="Detailing Litoměřice" class="h-12 w-auto">
        </a>
        <div class="flex items-center gap-8">
            <a href="#cenik" class="nav-link text-lg">CENÍK</a>
            <a href="#kontakt" class="nav-link text-lg">KONTAKT</a>
            <button onclick="toggleCart()" class="relative flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-5 py-2 rounded-full">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count" class="bg-[#00d4ff] text-zinc-950 text-xs font-bold px-2 py-0.5 rounded-full">0</span>
            </button>
        </div>
    </div>
</nav>

<!-- HERO + O NÁS + CENÍK (zkráceně, aby kód nebyl příliš dlouhý – zkopíruj své předchozí sekce) -->
<!-- ... (sem vlož své původní sekce HERO a O NÁS) ... -->

<!-- CENÍK s tlačítky do košíku -->
<section id="cenik" class="py-24 bg-black">
  <div class="max-w-7xl mx-auto px-6">
    <h2 class="text-5xl font-bold text-center mb-12">CENÍK SLUŽEB – klikni a přidej do košíku</h2>
    
    <div class="grid md:grid-cols-2 gap-6" id="services">
      <!-- Služba 1 -->
      <div class="bg-zinc-900 p-6 rounded-2xl flex justify-between items-center">
        <div>
          <h3 class="font-bold text-xl">Základní mytí exteriéru</h3>
          <p class="text-zinc-400">Ruční mytí + sušení</p>
          <span class="text-2xl font-mono text-[#00d4ff]">499 Kč</span>
        </div>
        <button onclick="addToCart(1, 'Základní mytí exteriéru', 499)" 
                class="btn-hover bg-[#00d4ff] text-zinc-950 px-6 py-3 rounded-xl font-semibold">Přidat do košíku</button>
      </div>

      <!-- Služba 2 -->
      <div class="bg-zinc-900 p-6 rounded-2xl flex justify-between items-center">
        <div>
          <h3 class="font-bold text-xl">Mytí kol + pneumatik</h3>
          <p class="text-zinc-400">Důkladné očištění</p>
          <span class="text-2xl font-mono text-[#00d4ff]">200 Kč</span>
        </div>
        <button onclick="addToCart(2, 'Mytí kol + pneumatik', 200)" 
                class="btn-hover bg-[#00d4ff] text-zinc-950 px-6 py-3 rounded-xl font-semibold">Přidat do košíku</button>
      </div>

      <!-- Služba 3 -->
      <div class="bg-zinc-900 p-6 rounded-2xl flex justify-between items-center">
        <div>
          <h3 class="font-bold text-xl">Úklid interiéru</h3>
          <p class="text-zinc-400">Vysátí + otření</p>
          <span class="text-2xl font-mono text-[#00d4ff]">490 Kč</span>
        </div>
        <button onclick="addToCart(3, 'Úklid interiéru', 490)" 
                class="btn-hover bg-[#00d4ff] text-zinc-950 px-6 py-3 rounded-xl font-semibold">Přidat do košíku</button>
      </div>

      <!-- Kompletní balíček -->
      <div class="bg-zinc-900 p-6 rounded-2xl flex justify-between items-center border-2 border-[#00d4ff]">
        <div>
          <h3 class="font-bold text-xl text-[#00d4ff]">Kompletní základní balíček 🔥</h3>
          <p class="text-zinc-400">Všechny tři služby najednou</p>
          <span class="text-3xl font-mono text-[#00d4ff]">1 000 Kč</span>
        </div>
        <button onclick="addToCart(4, 'Kompletní balíček', 1000)" 
                class="btn-hover bg-white text-zinc-950 px-8 py-3 rounded-xl font-semibold">Přidat do košíku</button>
      </div>
    </div>

    <!-- Košík panel -->
    <div id="cart-panel" class="hidden fixed bottom-0 right-0 top-16 w-96 bg-zinc-900 border-l border-zinc-700 shadow-2xl overflow-auto">
      <div class="p-6">
        <h3 class="text-2xl font-bold flex justify-between">
          Tvůj košík <button onclick="toggleCart()" class="text-xl">✕</button>
        </h3>
        <div id="cart-items" class="my-6 space-y-4"></div>
        
        <div class="border-t border-zinc-700 pt-4">
          <div class="flex justify-between text-xl">
            <span>Celkem:</span>
            <span id="cart-total" class="font-bold text-[#00d4ff]">0 Kč</span>
          </div>
          <button onclick="sendOrderFromCart()" 
                  class="w-full mt-6 bg-[#00d4ff] hover:bg-white hover:text-zinc-950 text-zinc-950 py-4 rounded-2xl font-bold text-lg">
            ODESLAT OBJEDNÁVKU Z KOŠÍKU
          </button>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- KONTAKT (původní + tlačítko pro košík) -->
<section id="kontakt" class="py-20 bg-zinc-950">
  <!-- ... tvůj původní formulář zůstává stejný ... -->
  <!-- (zde zůstává celý tvůj kontakt formulář a success message) -->
  
  <script>
    // === EMAILJS ===
    emailjs.init({ publicKey: "TVŮJ_PUBLIC_KEY_ZDE" });   // ← vyměň

    let cart = [];

    function addToCart(id, name, price) {
      const existing = cart.find(item => item.id === id);
      if (existing) existing.qty++;
      else cart.push({id, name, price, qty: 1});
      
      updateCartUI();
      alert(`✅ ${name} přidáno do košíku!`);
    }

    function removeFromCart(id) {
      cart = cart.filter(item => item.id !== id);
      updateCartUI();
    }

    function updateCartUI() {
      document.getElementById('cart-count').textContent = cart.reduce((sum, i) => sum + i.qty, 0);
      
      let html = '';
      let total = 0;
      
      cart.forEach(item => {
        const itemTotal = item.price * item.qty;
        total += itemTotal;
        html += `
          <div class="flex justify-between cart-item">
            <div>
              <div>${item.name}</div>
              <div class="text-sm text-zinc-400">${item.qty}× ${item.price} Kč</div>
            </div>
            <div class="text-right">
              <div class="font-bold">${itemTotal} Kč</div>
              <button onclick="removeFromCart(${item.id})" class="text-red-500 text-sm">smazat</button>
            </div>
          </div>`;
      });
      
      document.getElementById('cart-items').innerHTML = html || '<p class="text-zinc-400">Košík je prázdný</p>';
      document.getElementById('cart-total').textContent = total + ' Kč';
    }

    function toggleCart() {
      const panel = document.getElementById('cart-panel');
      panel.classList.toggle('hidden');
    }

    // === ODESLÁNÍ OBJEDNÁVKY Z KOŠÍKU ===
    function sendOrderFromCart() {
      if (cart.length === 0) return alert("Košík je prázdný");

      const summary = cart.map(i => `${i.qty}× ${i.name} – ${i.price * i.qty} Kč`).join('\n');
      const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);

      const templateParams = {
        name: "Objednávka z košíku",   // můžeš nechat prázdné nebo doplnit z formuláře
        phone: "",
        email: "detailinglitomerice@gmail.com",
        message: `=== OBJEDNÁVKA Z KOŠÍKU ===\n\n${summary}\n\nCelkem: ${total} Kč\n\nZákazník si přeje: (doplň kontakt v odpovědi)`,
        date: new Date().toLocaleString('cs-CZ'),
        cart_summary: summary,
        total: total
      };

      // ← TADY POUŽIJ NOVÝ TEMPLATE (který si vytvoříš)
      emailjs.send('service_grki78a', 'template_wzsl67r', templateParams)   // ← změň na nový template ID
        .then(() => {
          alert('✅ Objednávka byla odeslána na tvůj email!');
          cart = [];
          updateCartUI();
          toggleCart();
        })
        .catch(err => alert('Chyba: ' + err));
    }

    // Původní kontakt formulář zůstává (tvůj kód z minula)
    // ... (vlož sem svůj původní kontakt script) ...
  </script>
</section>

<!-- Floating cart button (pro mobil) -->
<button onclick="toggleCart()" class="fixed bottom-6 right-6 bg-[#00d4ff] text-zinc-950 w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-3xl md:hidden">
  🛒
</button>

</body>
</html>
